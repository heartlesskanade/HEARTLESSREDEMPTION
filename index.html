<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartless & Redemption</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 40px 20px;
        }

        header {
            width: 100%;
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 0;
            color: #e0e0e0;
            text-shadow: 2px 2px 15px rgba(255, 0, 0, 0.3);
            text-transform: uppercase;
        }

        /* Layout Principale a due colonne */
        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 60px;
            width: 100%;
            max-width: 1200px;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: rgba(15, 15, 15, 0.6);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .column h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            font-weight: normal;
            margin: 0 0 20px 0;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(139, 0, 0, 0.6);
        }

        .image-wrapper {
            width: 100%;
            max-width: 400px;
            margin-bottom: 25px;
        }

        img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1; /* Forza l'immagine a rimanere quadrata come una cover */
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .status-info {
            font-size: 2rem;
            font-weight: 700;
            height: 60px; /* Altezza fissa per tenere i bottoni allineati alla stessa altezza */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Colore specifico per il countdown attivo */
        #countdown {
            color: #8b0000; /* Rosso scuro */
        }

        /* Colore specifico per il testo da svelare */
        .to-be-revealed {
            color: #666666; /* Grigio cenere/misterioso */
            font-size: 1.4rem;
        }

        .btn {
            text-decoration: none;
            background-color: #ffffff;
            color: #000000;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 2px;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 80%;
            max-width: 280px;
        }

        .btn:hover {
            background-color: #8b0000;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.8);
        }

        /* Ottimizzazione per dispositivi mobili (schermi piccoli) */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .column {
                width: 100%;
                max-width: 450px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .status-info {
                height: auto;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>HEARTLESS E REDEMPTION STANNO ARRIVANDO.</h1>
    </header>

    <div class="main-container">

        <div class="column">
            <h2>Redemption</h2>
            <div class="image-wrapper">
                <img src="redemption.jpeg" alt="Redemption Cover">
            </div>
            <div id="countdown" class="status-info">Calcolo del tempo...</div>
            <a href="https://www.instagram.com/camouflagehero?igsh=eGdpd244M2ZnNjAx" class="btn" target="_blank">Entra</a>
        </div>

        <div class="column">
            <h2>Heartless</h2>
            <div class="image-wrapper">
                <img src="heartlessthealbumcover.jpeg" alt="Heartless Cover">
            </div>
            <div class="status-info to-be-revealed">DATA ANCORA DA SVELARE.</div>
            <a href="https://www.instagram.com/heartlessthealbum" class="btn" target="_blank">Entra</a>
        </div>

    </div>

    <script>
        // Configurazione del countdown per il 14 Maggio 2027 all'01:00:00 di notte
        const countDownDate = new Date("May 14, 2027 01:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                days + "G : " + formatTime(hours) + "H : " + formatTime(minutes) + "M : " + formatTime(seconds) + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "REDEMPTION IS HERE.";
            }
        }, 1000);
    </script>

</body>
</html>
